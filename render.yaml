services:
  # ── Unified Fullstack Web Service ──
  - type: web
    name: raja-rajeshwari-backend
    env: node
    plan: free
    # We build the backend dependencies, frontend dependencies, and compile the frontend
    buildCommand: npm install --prefix backend --legacy-peer-deps && npm install --prefix frontend --legacy-peer-deps && npm run build --prefix frontend
    startCommand: node backend/server.js
    envVars:
      - key: MONGODB_URI
        sync: false # Enter your MongoDB connection string in Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure random JWT secret automatically
      - key: PORT
        value: 5000
